services:
  asmc-perception-train:
    build:
      context: .
      dockerfile: Dockerfile
    image: asmc/perception-train:dev
    container_name: asmc-perception-train
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ../..:/root/ws:rw
      - ${ASMC_DATA:-../data}:/data:ro
    shm_size: "8gb"
    stdin_open: true
    tty: true
    command: ["tail", "-f", "/dev/null"]
