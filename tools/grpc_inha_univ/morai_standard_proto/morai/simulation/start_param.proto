syntax = "proto3";

package morai_sim_api.simulation;

import "morai/common/type.proto";
import "morai/simulation/sync_mode.proto";
import "morai/actor/actor_set.proto";
import "morai/simulation/simulation_enum.proto";

option optimize_for = SPEED;
option csharp_namespace = "CoreLib.Grpc.Protobuf.MoraiSimAPI.Simulation";

/**
 * 시뮬레이션을 시작하기 위해 필요한 설정
 */
message StartParam
{
    // 시뮬레이션을 진행할 지도와 Ego차량 설정
    MapAndVehicle map_and_vehicle = 1;

    // Ego 차량의 label, id 설정
    actor.EgoSetting ego_setting = 2;

    // Ego 차량의 transform 설정
    Transform ego_transform = 3;

    // Ego 차량의 cruise 설정
    actor.EgoCruiseControl ego_cruise_setting = 4;

    // Synchronous 모드 설정
    SyncMode mode = 5;

    // // Actor 배치
    // ActorSettings actor_settings = 6;

    // 시뮬레이션 설정 (시나리오, 센서 설정)
    SimulationSettings simulation_settings = 7;

    // Client에서 생성한 임의의 문자열로, 이 문자열로 생성한 Actor를 삭제한다.
    string client_key = 8;
}

/**
 * 시뮬레이션 할 맵과 Ego 차량 선택
 */
message MapAndVehicle
{
    // 맵 이름
    string map_name = 1;

    // Ego 차량의 모델 명
    string ego_vehicle_model = 2;
}

// /**
//  * Actor 설정
//  */
// message ActorSettings
// {
// }

/**
 * 시뮬레이션 설정
 */
message SimulationSettings
{    
    // MORAI SIM 의 시나리오 파일 이름
    string morai_scenario_filename = 1;

    // 센서 설정 파일 이름
    string sensor_setting_filename = 2;
}

message SimulationModeParam
{
    // 1. Normal, 2. Scenario runner, 3. Datagen, 4.....
    SimulationModeType mode = 1;
}

message SendMessageParam
{
    uint32 type = 1;
    string message = 2;
}

message StringListParam
{
    string message = 1;
}