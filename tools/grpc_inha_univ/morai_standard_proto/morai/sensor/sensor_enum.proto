syntax = "proto3";

package morai_sim_api.sensor;

option optimize_for = SPEED;
option csharp_namespace = "CoreLib.Grpc.Protobuf.MoraiSimAPI.Sensor";

enum SensorType
{
    SENSOR_TYPE_UNSPECIFIED = 0;
    SENSOR_TYPE_CAMERA = 1;
    SENSOR_TYPE_LIDAR3D = 2;
    SENSOR_TYPE_LIDAR2D = 3;
    SENSOR_TYPE_GPS = 4;
    SENSOR_TYPE_IMU = 5;
    SENSOR_TYPE_RADAR = 6;
    SENSOR_TYPE_ULTRASONIC = 7;
    SENSOR_TYPE_GROUNDTRUTH = 8;
    SENSOR_TYPE_VELARRAY = 9;
    SENSOR_TYPE_LIGHT = 10;
    SENSOR_TYPE_DELPHI_RADAR = 11;
    SENSRO_TYPE_TOF = 12;
    SENSOR_TYPE_END = 13;
}

enum GTShapeType
{
    GT_SHAPE_UNSPECIFIED = 0;
    GT_SHAPE_CYLINDER = 1;
    GT_SHAPE_CONE = 2;
    GT_SHAPE_END = 3;
}

enum GTObstacleObjType
{
    GT_OBSTACLE_OBJ_INKNOWN = 0;
    GT_OBSTACLE_OBJ_VEHICLE = 1;
    GT_OBSTACLE_OBJ_PEDESTRIAN = 2;
    GT_OBSTACLE_OBJ_EGOVEHICLE = 3;
    GT_OBSTACLE_OBJ_OBSTACLE = 4;
    GT_OBSTACLE_OBJ_SPAWNPOINT = 5;
    GT_OBSTACLE_OBJ_MOVINGOBJECT = 6;
    GT_OBSTACLE_OBJ_EXTRAOBSTACLE = 7;
    GT_OBSTACLE_OBJ_SSAFYSPAWNPOINT = 8;
    GT_OBSTACLE_OBJ_DESTINATIONPOINT = 9;
    GT_OBSTACLE_OBJ_STOPOVERPOINT = 10;
    GT_OBSTACLE_OBJ_PEDSPAWNPOINT = 11;
    GT_OBSTACLE_OBJ_SHADEDAREA = 12;
    GT_OBSTACLE_OBJ_MAPOBJECT = 13;
    GT_OBSTACL_OBJ_MAX = 14;
}

enum DataQualifier
{
    DATA_QUALIFIER_NONE = 0;
    DATA_QUALIFIER_OTHER = 1;
    DATA_QUALIFIER_BLINDNESS = 2;
    // DATA_QUALIFIER_AVAILABLE_REDUCED = 3;
    // DATA_QUALIFIER_NOT_AVAILABLE = 4;
    // DATA_QUALIFIER_TEMPORARY_AVAILABLE = 5;
}

enum FaultType
{
    None = 0;
    Blur = 1;
    Dust = 2;
}