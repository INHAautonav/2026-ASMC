syntax = "proto3";

package morai_sim_api.environment;

option optimize_for = SPEED;
option csharp_namespace = "CoreLib.Grpc.Protobuf.MoraiSimAPI.Environment";

/**
 * 시뮬레이션 시간
 */
message SimulationTime
{
    // 시간 (0~24h)
    int32 hour = 1;
    
    // 데이터만 변경할 것인지 여부
    bool data_only = 2;

    // 신규 추가
    bool instantly = 3;
}
