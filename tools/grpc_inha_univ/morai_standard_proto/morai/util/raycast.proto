syntax = "proto3";

package morai_sim_api.util;

import "morai/common/type.proto";

option optimize_for = SPEED;
option csharp_namespace = "CoreLib.Grpc.Protobuf.MoraiSimAPI.Util";

message RaycastParam
{
    // source 위치
    Vector3 source = 1;

    // target 위치
    Vector3 target = 2;

    // 최대 길이
    float max_dist = 3;
}