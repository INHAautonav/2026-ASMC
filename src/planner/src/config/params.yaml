# =========================================================
# Frenet Frame Planner 파라미터
# 각 블록은 코드의 struct와 1:1로 대응됨.
# =========================================================

planner:

  # FSM이 아직 없을 때 쓰는 값들 (검증 노드 전용, 논문/구조체와 무관)
  planning_frequency: 10.0     # 플래닝 루프 주기 [Hz] (논문 Sec.VIII: 100ms)
  viz_frame_id: "map"          # rviz MarkerArray의 frame_id.
  ego_frame_id: "ego_vehicle"  # rviz에서 사용, 매 사이클 발행하는 map->ego_vehicle tf 이름.

  default_target_speed: 10.0    # PlannerCommand.target_speed 고정값 [m/s]
  wheelbase: 3.0                 # [m] 축거. CBEgoState의 kappa 추정(자전거 모델)에 사용. mpc_controller/mpc_params.yaml과 동일.

  # --- behavior_bridge.hpp: /behavior/context 연동 ------------
  lane_width: 3.5                  # [m] 차선변경 목표 d 오프셋. link_set.json 전체 634개 링크가
                                    # 예외 없이 width_start=width_end=3.5 라 실측값 그대로 사용.
  behavior_context_timeout: 0.5    # [s] 이보다 오래된 BehaviorContext는 폐기하고 LANE_KEEPING 폴백.
  emergency_stop_buffer: 12.0      # [m] EMERGENCY_STOP인데 stop_before_s가 sentinel(1e9, 정지선
                                    # 미탐지)이면 ego 현재 s + 이 값을 대신 정지 목표로 사용.

  # --- PathGeneratorConfig (path_generator.hpp) ---------------
  # 논문 Sec.IV-A/V-A/V-B의 후보 샘플링 격자. 각 항목은 (min, max, step).
  path_generator:
    lateral_d1:     { min: -3.0, max: 3.0, step: 0.5 }   # d1 후보 범위 [m]. 자차/장애물 간 안전거리 때문에 존재하는 값.
    time_horizon:   { min: 2.0,  max: 5.0, step: 1.0 }   # Tj 후보 범위 [s], lateral/longitudinal 공통
    delta_s:        { min: -3.0, max: 3.0, step: 1.0 }   # Δsi 범위 [m] (following/merging/stopping)
    delta_s_dot:    { min: -2.0, max: 2.0, step: 1.0 }   # Δṡi 범위 [m/s] (velocity keeping)
    dt: 0.1                                              # 궤적 샘플링 간격 [s]

  # --- KinematicLimits (path_generator.hpp) -------------------
  # Sec.VI 1단(사전 필터)/3단(곡률 필터)에서 쓰는 한계값.
  kinematic_limits:
    max_lateral_accel: 3.0        # |d̈| 허용치 [m/s^2]
    max_longitudinal_accel: 3.0   # |s̈| 허용치 [m/s^2]
    max_curvature: 0.1704         # |kappa_x| 허용치 [1/m] (= 1 / 최소 회전반경).

  # --- CostWeights (cost.hpp) ---------------------------------
  # Prop.1의 C = kj*Jt + kt*g(T) + kp*h(p1) 을 실제로 구체화하는 가중치.
  cost_weights:
    kj: 1.0        # jerk 적분항 가중치 (공통)
    kt: 1.0        # 시간항 가중치 (공통)
    kd: 1.0        # lateral 종료위치 가중치 (kd*d1^2) - 기본 가중치에서 kd가 상대적으로 너무 작아서 키워줘야함
    ks: 1.0        # longitudinal 목표위치 가중치 (ks*delta_s^2)
    ks_dot: 1.0    # longitudinal 목표속도 가중치 (ks_dot*delta_s_dot^2)
    klat: 1.0      # Sec.VI: C_tot = klat*C_lat + klon*C_lon
    klon: 1.0

  # EMERGENCY_STOP 전용 가중치 — 승차감(jerk)보다 "가장 빨리 정지"를 우선하도록
  # kt(시간비용)를 크게 키움. behavior_bridge.hpp가 EMERGENCY 모드일 때만 이걸 씀.
  cost_weights_emergency:
    kj: 1.0
    kt: 20.0
    kd: 1.0
    ks: 1.0
    ks_dot: 1.0
    klat: 1.0
    klon: 1.0

  # --- VehicleShape (collision_checker.hpp) -------------------
  # 자차 충돌판정용 크기. 논문엔 없는 값 (Sec.VI가 "자차 크기"라고만 언급).
  vehicle_shape:
    width: 1.9     # [m]
    length: 4.5    # [m]

  # --- CollisionCheckConfig (collision_checker.hpp) -----------
  # Sec.VI 마지막 문단: 안전마진 + 시간에 따라 부풀리는 컨투어.
  collision_check:
    safety_margin: 0.3        # 기본 안전마진 [m]
    margin_growth_rate: 0.1   # 마진이 시간에 따라 커지는 비율 [m/s]
    reactive_lookahead: 8.0   # [s] 논문 Sec.VI/Fig.6 "reactive layer" 개념(짧은 T 후보가 장애물을 못 보고 통과되는 사각지대 방지).


waypoint_file: ""